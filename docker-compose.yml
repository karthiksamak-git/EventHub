version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: eventhub-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=eventhub
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: eventhub-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/eventhub
      - JWT_SECRET=eventhub_super_secret_jwt_key_2024
      - JWT_EXPIRE=7d
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
